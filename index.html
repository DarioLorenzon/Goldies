<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Handball Training</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
}

table{
border-collapse:collapse;
}

td,th{
border:1px solid #999;
padding:5px;
text-align:center;
}

select{
width:70px;
}

.ja { background:#8f8 }
.ev { background:#ff8 }
.nein { background:#f88 }

</style>

</head>

<body>

<h2>Handball Trainingsübersicht</h2>

<table id="tabelle"></table>

<script>

function setColor(select){

select.className = select.value

}

Papa.parse("teilnahmen.csv", {

download:true,

complete:function(res){

let data=res.data
let table=document.getElementById("tabelle")

data.forEach((row,r)=>{

let tr=document.createElement("tr")

row.forEach((cell,c)=>{

let td=document.createElement(r==0?"th":"td")

if(r>0 && c>0){

let sel=document.createElement("select")

;["","ja","ev.","nein"].forEach(v=>{

let o=document.createElement("option")
o.value=v
o.text=v

if(cell==v) o.selected=true

sel.appendChild(o)

})

sel.onchange=()=>setColor(sel)

setColor(sel)

td.appendChild(sel)

}else{

td.textContent=cell

}

tr.appendChild(td)

})

table.appendChild(tr)

})

}

})

</script>

</body>
</html>
