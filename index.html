<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<h2>Training</h2>

<button onclick="save()">Speichern</button>

<table id="t"></table>

<script>

let data=[]

Papa.parse("teilnahmen.csv",{

download:true,

complete:r=>{

data=r.data

draw()

}

})

function draw(){

let t=document.getElementById("t")

t.innerHTML=""

data.forEach((row,r)=>{

let tr=document.createElement("tr")

row.forEach((c,i)=>{

let td=document.createElement(r? "td":"th")

if(r&&i){

let s=document.createElement("select")

;["","ja","ev","nein"].forEach(v=>{

let o=document.createElement("option")

o.text=v
o.value=v

if(c==v) o.selected=true

s.appendChild(o)

})

s.onchange=()=>data[r][i]=s.value

td.appendChild(s)

}else{

td.textContent=c

}

tr.appendChild(td)

})

t.appendChild(tr)

})

}

function save(){

let csv=data.map(r=>r.join(",")).join("\n")

fetch(
"https://api.github.com/repos/DarioLorenzon/Goldies/issues",
{
method:"POST",
headers:{
Accept:"application/vnd.github+json"
},
body:JSON.stringify({

title:"save",
body:csv

})
}
)

alert("gesendet")

}

</script>

</body>
</html>
