<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

</head>

<body>

<h2>Training</h2>

<button onclick="save()">Speichern</button>

<table id="t"></table>

<script>

const firebaseConfig = {

API_HIER

};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

let data = []

async function load(){

let doc = await db.collection("training").doc("list").get()

if(doc.exists){

data = doc.data().data

}else{

data = [
["Name","1","2"],
["Dario","",""],
["Marco","",""]
]

}

draw()

}

function draw(){

let t=document.getElementById("t")

t.innerHTML=""

data.forEach((row,r)=>{

let tr=document.createElement("tr")

row.forEach((c,i)=>{

let td=document.createElement(r?"td":"th")

if(r&&i){

let s=document.createElement("select")

;["","ja","ev","nein"].forEach(v=>{

let o=document.createElement("option")

o.text=v
o.value=v

if(c==v) o.selected=true

s.appendChild(o)

})

s.onchange=()=>data[r][i]=s.value

td.appendChild(s)

}else{

td.textContent=c

}

tr.appendChild(td)

})

t.appendChild(tr)

})

}

async function save(){

await db.collection("training").doc("list").set({

data:data

})

alert("gespeichert")

}

load()

</script>

</body>
</html>
