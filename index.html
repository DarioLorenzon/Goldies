<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">


<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Termine Goldies</h2>

<button onclick="save()">Speichern</button>

<br><br>

<table id="t"></table>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA_X89nznC06g7brnrVmQoFHG2SiTXk0Hc",
  authDomain: "goldies-89ea2.firebaseapp.com",
  projectId: "goldies-89ea2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let data = [];


// Default Tabelle

function defaultData() {

function loadCSV(){

return new Promise((resolve)=>{

Papa.parse("./teilnahmen.csv",{

download:true,

skipEmptyLines:false,

complete:(res)=>{

console.log("CSV",res.data)

resolve(res.data)

},

error:(err)=>{

alert("CSV Fehler "+err)

resolve(defaultData())

}

})

})

}

  
  return [
    ["Name","14.05","21.05","28.05"],
    ["Dario","","",""],
    ["Marco","","",""],
    ["Sven","","",""]
  ];

}


// Tabelle zeichnen

function draw() {

  let t = document.getElementById("t");

  t.innerHTML = "";

  data.forEach((row, r) => {

    let tr = document.createElement("tr");

    row.forEach((c, i) => {

      let td = document.createElement(r ? "td" : "th");

      if (r && i) {

        let s = document.createElement("select");

        ["","ja","ev","nein"].forEach(v => {

          let o = document.createElement("option");

          o.value = v;
          o.text = v;

          if (c == v) o.selected = true;

          s.appendChild(o);

        });

        s.onchange = () => data[r][i] = s.value;

        td.appendChild(s);

      } else {

        td.textContent = c;

      }

      tr.appendChild(td);

    });

    t.appendChild(tr);

  });

}


// Laden

async function load() {

  try {

    let doc = await db.collection("training").doc("list").get();

    if (doc.exists && doc.data().json) {

      data = JSON.parse(doc.data().json);

    } else {

      data = await loadCSV();

    }

  } catch (e) {

    data = await loadCSV();

  }

  draw();

}


// Speichern

async function save() {

  try {

    await db.collection("training").doc("list").set({

      json: JSON.stringify(data)

    });

    alert("gespeichert");

  } catch (e) {

    alert("Save Fehler: " + e);

  }

}


load();

</script>

</body>
</html>
