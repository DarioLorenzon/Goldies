<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Handball Training</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

table{
border-collapse:collapse;
}

td,th{
border:1px solid #999;
padding:5px;
text-align:center;
}

select{
width:70px;
}

</style>

</head>

<body>

<h2>Handball Trainingsübersicht</h2>

<button onclick="save()">Speichern</button>

<table id="tabelle"></table>

<script>

let dataGlobal

Papa.parse("teilnahmen.csv", {

download:true,

complete:function(res){

dataGlobal=res.data

draw()

}

})

function draw(){

let table=document.getElementById("tabelle")

table.innerHTML=""

dataGlobal.forEach((row,r)=>{

let tr=document.createElement("tr")

row.forEach((cell,c)=>{

let td=document.createElement(r==0?"th":"td")

if(r>0 && c>0){

let sel=document.createElement("select")

;["","ja","ev.","nein"].forEach(v=>{

let o=document.createElement("option")
o.value=v
o.text=v

if(cell==v) o.selected=true

sel.appendChild(o)

})

sel.onchange=()=>{

dataGlobal[r][c]=sel.value

}

td.appendChild(sel)

}else{

td.textContent=cell

}

tr.appendChild(td)

})

table.appendChild(tr)

})

}

async function save(){

let csv=dataGlobal.map(r=>r.join(",")).join("\n")

let token="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"
let repo="DarioLorenzon/Goldies"
let path="teilnahmen.csv"

let res1=await fetch(
`https://api.github.com/repos/${repo}/contents/${path}`
)

let json1=await res1.json()

let sha=json1.sha

await fetch(
`https://api.github.com/repos/${repo}/contents/${path}`,
{
method:"PUT",

headers:{
Authorization:"token "+token,
"Content-Type":"application/json"
},

body:JSON.stringify({

message:"update",

content:btoa(csv),

sha:sha

})

})

alert("Gespeichert")

}

</script>

</body>
</html>
