<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
}

table{
border-collapse:collapse;
}

td,th{
border:1px solid #999;
padding:4px;
text-align:center;
min-width:60px;
}

th{
background:#ddd;
position:sticky;
top:0;
z-index:3;
}

.name{
position:sticky;
left:0;
background:#eee;
z-index:2;
text-align:left;
}

.header-name{
position:sticky;
left:0;
top:0;
background:#ccc;
z-index:4;
}

.ja{background:#8f8;}
.ev{background:#ff8;}
.nein{background:#f88;}

.count{
background:#ddd;
font-weight:bold;
}

.weekend{
font-weight:bold;
background:#f0f0f0;
}

</style>

</head>

<body>

<h2>Training</h2>

<button onclick="save()">Speichern</button>

<br><br>

<table id="t"></table>

<script>

// ---------- Firebase ----------

const firebaseConfig = {
  apiKey: "AIzaSyA_X89nznC06g7brnrVmQoFHG2SiTXk0Hc",
  authDomain: "goldies-89ea2.firebaseapp.com",
  projectId: "goldies-89ea2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let data = [];


// ---------- CSV ----------

function isWeekend(text){

if(!text) return false

// erwartet Format TT.MM oder TT.MM.JJJJ

let parts=text.split(".")

if(parts.length<2) return false

let d=parseInt(parts[0])
let m=parseInt(parts[1])-1
let y=2026

let date=new Date(y,m,d)

let day=date.getDay()

return day===0 || day===6

}
  
function loadCSV(){

return new Promise((resolve)=>{

Papa.parse("./teilnahmen.csv",{

download:true,
skipEmptyLines:true,

complete:(res)=>{

let rows=res.data

let max=0

rows.forEach(r=>{
if(r.length>max) max=r.length
})

rows=rows.map(r=>{
while(r.length<max) r.push("")
return r
})

resolve(rows)

}

})

})

}


// ---------- draw ----------

function draw(){

let t=document.getElementById("t")
t.innerHTML=""

if(!data.length) return

let cols=data[0].length

let counts=new Array(cols).fill(0)

for(let r=0;r<data.length;r++){

let tr=document.createElement("tr")

for(let c=0;c<cols;c++){

let td=document.createElement(r==0?"th":"td")

let val=data[r][c]||""

if(r===0){

td.textContent=val

if(c===0) td.className="header-name"

if(isWeekend(val)){
td.classList.add("weekend")
}

}

else if(c===0){

td.textContent=val
td.className="name"

}

else{

let s=document.createElement("select")

let opts=["","ja","ev","nein"]

opts.forEach(v=>{

let o=document.createElement("option")

o.value=v
o.text=v

if(val===v) o.selected=true

s.appendChild(o)

})

s.onchange=()=>{
data[r][c]=s.value
draw()
}

td.appendChild(s)

if(val==="ja"){
td.classList.add("ja")
counts[c]++
}

if(val==="ev") td.classList.add("ev")
if(val==="nein") td.classList.add("nein")

}

tr.appendChild(td)

}

t.appendChild(tr)

}


// total row

let tr=document.createElement("tr")

for(let c=0;c<cols;c++){

let td=document.createElement("td")

if(c===0){

td.textContent="Total"
td.className="name"

}else{

td.textContent=counts[c]
td.className="count"

}

tr.appendChild(td)

}

t.appendChild(tr)

}


// ---------- load ----------

async function load(){

try{

let doc=await db.collection("training").doc("list").get()

if(doc.exists && doc.data().json){

data=JSON.parse(doc.data().json)

}else{

data=await loadCSV()

}

}catch{

data=await loadCSV()

}

draw()

}


// ---------- save ----------

async function save(){

await db.collection("training").doc("list").set({

json:JSON.stringify(data)

})

alert("gespeichert")

}


load()

</script>

</body>
</html>
