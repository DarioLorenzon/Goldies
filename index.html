<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Handball Training</h2>

<button onclick="save()">Speichern</button>

<br><br>

<table id="t"></table>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyA_X89nznC06g7brnrVmQoFHG2SiTXk0Hc",
  authDomain: "goldies-89ea2.firebaseapp.com",
  projectId: "goldies-89ea2",
  storageBucket: "goldies-89ea2.firebasestorage.app",
  messagingSenderId: "210598012879",
  appId: "1:210598012879:web:dca79e3e3eb237e5bb14ba"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let data = []


// Default Tabelle
function defaultData(){

return [
["Name","14.05","21.05","28.05"],
["Dario","","",""],
["Marco","","",""],
["Sven","","",""]
]

}


// Objekt → Array
function toArray(obj){

let arr=[]

Object.keys(obj).forEach(k=>{

arr.push(obj[k])

})

return arr

}


// Array → Objekt
function toObject(arr){

let obj={}

arr.forEach((r,i)=>{

obj[i]=r

})

return obj

}



async function load(){

try{

const ref = db.collection("training").doc("list")

const snap = await ref.get()

if(snap.exists){

data = toArray(snap.data().data)

}else{

data = defaultData()

}

draw()

}catch(e){

alert("Load Fehler: "+e)

data = defaultData()

draw()

}

}



function draw(){

let t=document.getElementById("t")

t.innerHTML=""

data.forEach((row,r)=>{

let tr=document.createElement("tr")

row.forEach((c,i)=>{

let td=document.createElement(r?"td":"th")

if(r && i){

let s=document.createElement("select")

;["","ja","ev","nein"].forEach(v=>{

let o=document.createElement("option")

o.value=v
o.text=v

if(c==v) o.selected=true

s.appendChild(o)

})

s.onchange=()=>data[r][i]=s.value

td.appendChild(s)

}else{

td.textContent=c

}

tr.appendChild(td)

})

t.appendChild(tr)

})

}



async function save(){

try{

const ref=db.collection("training").doc("list")

await ref.set({

data:toObject(data)

})

alert("gespeichert")

}catch(e){

alert("Save Fehler: "+e)

}

}


load()

</script>

</body>
</html>
