<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Training</h2>

<button onclick="save()">Speichern</button>

<br><br>

<table id="t"></table>


<script>

// ---------------- Firebase ----------------

const firebaseConfig = {
  apiKey: "AIzaSyA_X89nznC06g7brnrVmQoFHG2SiTXk0Hc",
  authDomain: "goldies-89ea2.firebaseapp.com",
  projectId: "goldies-89ea2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let data = []


// ---------------- Default ----------------

function defaultData(){

return [
["Name","14.05","21.05","28.05"],
["Dario","","",""],
["Marco","","",""],
["Sven","","",""]
]

}


// ---------------- CSV laden ----------------

function loadCSV(){

return new Promise((resolve)=>{

Papa.parse("./teilnahmen.csv",{

download:true,
delimiter:";",
skipEmptyLines:true,

complete:(res)=>{

let cleaned = res.data.map(r => {

while(r.length && r[r.length-1] === ""){
r.pop()
}

return r

})

resolve(cleaned)

},

error:(err)=>{

alert("CSV Fehler "+err)
resolve(defaultData())

}

})

})

}


// ---------------- Tabelle zeichnen ----------------

function draw(){

let t=document.getElementById("t")

t.innerHTML=""

data.forEach((row,r)=>{

let tr=document.createElement("tr")

row.forEach((c,i)=>{

let td=document.createElement(r ? "td" : "th")

// Kopfzeile
if(r==0){

td.textContent=c

}

// Name Spalte
else if(i==0){

td.textContent=c

}

// Auswahlfelder
else{

let value = c ? c.trim() : ""

let s=document.createElement("select")

;["","ja","ev","nein"].forEach(v=>{

let o=document.createElement("option")

o.value=v
o.text=v

if(value==v) o.selected=true

s.appendChild(o)

})

s.onchange=()=>{

data[r][i]=s.value

}

td.appendChild(s)

}

tr.appendChild(td)

})

t.appendChild(tr)

})

}


// ---------------- Laden ----------------

async function load(){

try{

// zuerst CSV laden

let csv = await loadCSV()

if(csv && csv.length > 1){

data = csv

}else{

let doc = await db.collection("training").doc("list").get()

if(doc.exists && doc.data().json){

data = JSON.parse(doc.data().json)

}else{

data = defaultData()

}

}

}catch(e){

data = defaultData()

}

draw()

}


// ---------------- Speichern ----------------

async function save(){

try{

await db.collection("training").doc("list").set({

json: JSON.stringify(data)

})

alert("gespeichert")

}catch(e){

alert(e)

}

}


load()

</script>

</body>
</html>
