<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Training</h2>

<button onclick="save()">Speichern</button>

<br><br>

<table id="t"></table>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA_X89nznC06g7brnrVmQoFHG2SiTXk0Hc",
  authDomain: "goldies-89ea2.firebaseapp.com",
  projectId: "goldies-89ea2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let data = [];


// ---------------- CSV ----------------

function loadCSV(){

return new Promise((resolve)=>{

Papa.parse("./teilnahmen.csv",{

download:true,
skipEmptyLines:true,

complete:(res)=>{

let rows = res.data

// maximale Spaltenzahl finden
let maxCols = 0

rows.forEach(r=>{
if(r.length > maxCols) maxCols = r.length
})

// alle Zeilen auf gleiche Länge bringen
rows = rows.map(r=>{

let row = [...r]

while(row.length < maxCols){
row.push("")
}

return row

})

console.log("CSV fixed", rows)

resolve(rows)

},

error:(err)=>{

console.log(err)
resolve([])

}

})

})

}


// ---------------- draw ----------------

function draw(){

let t=document.getElementById("t")
t.innerHTML=""

for(let r=0;r<data.length;r++){

let tr=document.createElement("tr")

for(let c=0;c<data[0].length;c++){

let td=document.createElement(r==0?"th":"td")

if(r>0 && c>0){

let s=document.createElement("select")

let val=data[r][c]||""

;["","ja","ev","nein"].forEach(v=>{

let o=document.createElement("option")
o.value=v
o.text=v

if(val==v) o.selected=true

s.appendChild(o)

})

s.onchange=()=>data[r][c]=s.value

td.appendChild(s)

}else{

td.textContent=data[r][c]||""

}

tr.appendChild(td)

}

t.appendChild(tr)

}

}


// ---------------- load ----------------

async function load(){

try{

let doc=await db.collection("training").doc("list").get()

if(doc.exists && doc.data().json){

data=JSON.parse(doc.data().json)

}else{

data=await loadCSV()

}

}catch{

data=await loadCSV()

}

draw()

}


// ---------------- save ----------------

async function save(){

await db.collection("training").doc("list").set({

json:JSON.stringify(data)

})

alert("gespeichert")

}


load()

</script>

</body>
</html>
