  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


  <!-- =========================

<body>

  <div class="scroll-x">
    <table id="t"></table>
  </div>


  <script>


  /* =====================================
     FIREBASE CONFIG
  ===================================== */

  const firebaseConfig = {
    apiKey: "AIzaSyA_X89nznC06g7brnrVmQoFHG2SiTXk0Hc",
    authDomain: "goldies-89ea2.firebaseapp.com",
    projectId: "goldies-89ea2"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();



  /* =====================================
     GLOBAL DATA
  ===================================== */

  let data = [];
  let initialized = false;



  /* =====================================
     AUTOSAVE TIMER
  ===================================== */

  let saveTimer = null;

  function autoSave() {

    if (!initialized) return;

    clearTimeout(saveTimer);

    saveTimer = setTimeout(save, 800);

  }


  
/* =====================================
   LOAD CSV
   lädt teilnahmen.csv und entfernt
   leere Zeilen am Ende
===================================== */

function loadCSV() {

  return new Promise(resolve => {

    Papa.parse("./teilnahmen.csv", {

      download: true,

      complete: (res) => {

        let rows = res.data;


        /* -----------------------------
           leere Zeilen entfernen
        ----------------------------- */

        rows = rows.filter(r => {

          if (!r) return false;

          return r.some(v => v && v.trim() !== "");

        });


        /* -----------------------------
           gleiche Spaltenlänge
        ----------------------------- */

        let max = 0;

        rows.forEach(r => {
          if (r.length > max) max = r.length;
        });

        rows = rows.map(r => {

          while (r.length < max) {
            r.push("");
          }

          return r;

        });

        resolve(rows);

      }

    });

  });

}



/* =====================================
   MERGE CSV + FIREBASE
   Struktur:

   0 = Datum
   1 = Typ
   2+ = Spieler
===================================== */

function mergeData(csv, dbData) {

  let result = [];

  let rows = csv.length;
  let cols = csv[0].length;


  for (let r = 0; r < rows; r++) {

    result[r] = [];

    for (let c = 0; c < cols; c++) {

      let csvVal = csv[r]?.[c] ?? "";
      let dbVal = dbData?.[r]?.[c] ?? "";


      /* -----------------------------
         Datum
      ----------------------------- */

      if (r === 0) {

        result[r][c] = csvVal;

      }

      /* -----------------------------
         Typ
      ----------------------------- */

      else if (r === 1) {

        result[r][c] = csvVal;

      }

      /* -----------------------------
         Name
      ----------------------------- */

      else if (c === 0) {

        result[r][c] = csvVal;

      }

      /* -----------------------------
         Werte aus Firebase
      ----------------------------- */

      else {

        result[r][c] = dbVal || "";

      }

    }

  }

  return result;

}



/* =====================================
   WEEKEND CHECK
===================================== */

function isWeekend(text) {

  let p = text.split(".");

  if (p.length < 2) return false;

  let d = parseInt(p[0]);
  let m = parseInt(p[1]) - 1;

  let date = new Date(2026, m, d);

  let day = date.getDay();

  return day === 0 || day === 6;

}



/* =====================================
   FUTURE FILTER
   zeigt nur heute + Zukunft
===================================== */

function isFutureOrToday(text) {

  let p = text.split(".");

  if (p.length < 2) return true;

  let d = parseInt(p[0]);
  let m = parseInt(p[1]) - 1;

  let date = new Date(2026, m, d);

  let today = new Date();

  today.setHours(0, 0, 0, 0);

  return date >= today;

}



/* =====================================
   DRAW TABLE

   Aufbau:

   Datum
   Typ
   Total
   Spieler
   Spieler
   Datum unten
   Typ unten

===================================== */

function draw() {

  let t = document.getElementById("t");

  t.innerHTML = "";

  if (!data.length) return;


  /* -----------------------------
     sichtbare Spalten bestimmen
  ----------------------------- */

  let visibleCols = [];

  for (let c = 0; c < data[0].length; c++) {

    if (c === 0) {

      visibleCols.push(c);
      continue;

    }

    let val = data[0][c];

    if (isFutureOrToday(val)) {

      visibleCols.push(c);

    }

  }


  /* -----------------------------
     counts berechnen
  ----------------------------- */

  let counts = new Array(data[0].length).fill(0);

  for (let r = 2; r < data.length; r++) {

    for (let c = 1; c < data[0].length; c++) {

      if (data[r][c] === "ja") {

        counts[c]++;

      }

    }

  }


  /* =====================================
     HEADER DATUM
  ===================================== */

  let trHead = document.createElement("tr");

  visibleCols.forEach(c => {

    let th = document.createElement("th");

    let val = data[0][c] || "";

    th.textContent = val;

    if (isWeekend(val)) {

      th.classList.add("weekend");

    }

    trHead.appendChild(th);

  });

  t.appendChild(trHead);


  /* =====================================
     HEADER TYP
  ===================================== */

  let trType = document.createElement("tr");

  visibleCols.forEach(c => {

    let td = document.createElement("td");

    let val = data[1]?.[c] || "";

    td.textContent = val;

    td.style.fontSize = "12px";
    td.style.color = "#555";

    if (c === 0) {

      td.className = "name";

    }

    trType.appendChild(td);

  });

  t.appendChild(trType);


  /* =====================================
     TOTAL
  ===================================== */

  let trTotal = document.createElement("tr");

  visibleCols.forEach(c => {

    let td = document.createElement("td");

    if (c === 0) {

      td.textContent = "Total";
      td.className = "name total";

    } else {

      td.textContent = counts[c];
      td.className = "count";

    }

    trTotal.appendChild(td);

  });

  t.appendChild(trTotal);


  /* =====================================
     SPIELER
  ===================================== */

  for (let r = 2; r < data.length; r++) {

    let tr = document.createElement("tr");

    visibleCols.forEach(c => {

      let td = document.createElement("td");

      let val = data[r][c] || "";


      if (c === 0) {

        td.textContent = val;
        td.className = "name";

      }

      else {

        let s = document.createElement("select");

        ["", "ja", "ev", "nein"].forEach(v => {

          let o = document.createElement("option");

          o.value = v;
          o.text = v;

          if (val === v) {
            o.selected = true;
          }

          s.appendChild(o);

        });

        s.onchange = () => {

          data[r][c] = s.value;

          draw();

          autoSave();

        };

        td.appendChild(s);


        if (val === "ja") td.classList.add("ja");
        if (val === "ev") td.classList.add("ev");
        if (val === "nein") td.classList.add("nein");

      }

      tr.appendChild(td);

    });

    t.appendChild(tr);

  }


  /* =====================================
     DATUM UNTEN
  ===================================== */

  let trBottom = document.createElement("tr");

  visibleCols.forEach(c => {

    let th = document.createElement("th");

    let val = data[0][c] || "";

    th.textContent = val;

    if (isWeekend(val)) {

      th.classList.add("weekend");

    }

    trBottom.appendChild(th);

  });

  t.appendChild(trBottom);


  /* =====================================
     TYP UNTEN
  ===================================== */

  let trTypeBottom = document.createElement("tr");

  visibleCols.forEach(c => {

    let td = document.createElement("td");

    let val = data[1]?.[c] || "";

    td.textContent = val;

    td.style.fontSize = "12px";
    td.style.color = "#555";

    if (c === 0) {

      td.className = "name";

    }

    trTypeBottom.appendChild(td);

  });

  t.appendChild(trTypeBottom);

}


/* =====================================
   LOAD DATA

   1. CSV laden
   2. Firebase lesen
   3. merge
   4. speichern
   5. draw
===================================== */

async function load() {

  let csv = await loadCSV();

  let dbData = null;

  try {

    let doc = await db
      .collection("training")
      .doc("list")
      .get();

    if (doc.exists) {

      dbData = JSON.parse(
        doc.data().json
      );

    }

  }
  catch (e) {

    console.log("no firebase data");

  }


  data = mergeData(csv, dbData);


  await save();

  initialized = true;

  draw();

}



/* =====================================
   SAVE TO FIREBASE
===================================== */

async function save() {

  await db
    .collection("training")
    .doc("list")
    .set({

      json: JSON.stringify(data)

    });

}



/* =====================================
   START
===================================== */

load();
